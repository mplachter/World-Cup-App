// ─── FEED HOOK ────────────────────────────────────────────────────────────────
const FEED_URLS=[
  "https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json",
  "https://cdn.jsdelivr.net/gh/openfootball/worldcup.json@master/2026/worldcup.json",
];
const NORM={"Bosnia & Herzegovina":"Bosnia and Herzegovina","United States":"USA","Côte d'Ivoire":"Ivory Coast","Korea Republic":"South Korea"};
const norm=t=>NORM[t]||t;
const pkey=(a,b)=>[norm(a),norm(b)].sort().join("|");
function stageOf(r){if(!r)return"group";const s=r.toLowerCase();if(s.includes("round of 32"))return"r32";if(s.includes("round of 16"))return"r16";if(s.includes("quarter"))return"qf";if(s.includes("semi"))return"sf";if(s.includes("third"))return"3rd";if(s.includes("final"))return"final";return"group";}
function toET(t){if(!t)return"";const m=t.match(/(\d+):(\d+)\s*UTC([+-]\d+)/);if(!m)return t;const utcH=parseInt(m[1])-parseInt(m[3]);const etH=((utcH-4)%24+24)%24;const ap=etH>=12?"PM":"AM";const h12=etH%12||12;return`${h12}:${m[2]} ${ap} ET`;}
function processRaw(json){const byKey={},byNum={},all=[];(json.matches||[]).forEach(m=>{const h=norm(m.team1),a=norm(m.team2);const e={home:h,away:a,score:m.score?.ft?`${m.score.ft[0]}-${m.score.ft[1]}`:null,ht:m.score?.ht?`${m.score.ht[0]}-${m.score.ht[1]}`:null,goals1:m.goals1||[],goals2:m.goals2||[],date:m.date,time:toET(m.time),ground:m.ground,stage:stageOf(m.round),round:m.round,num:m.num||null,group:m.group||null};byKey[pkey(h,a)]=e;if(m.num)byNum[m.num]=e;all.push(e);});return{byKey,byNum,all};}

function useWorldCup(){
  const [data,setData]=useState(null);
  const [status,setStatus]=useState("loading");
  const [updated,setUpdated]=useState(null);
  const abort=useRef(null);
  const load=useCallback(async()=>{
    if(abort.current)abort.current.abort();
    const ctrl=new AbortController();abort.current=ctrl;
    setStatus("loading");
    for(const url of FEED_URLS){
      try{const r=await fetch(url,{signal:ctrl.signal,cache:"no-cache"});if(!r.ok)throw new Error(`HTTP ${r.status}`);const json=await r.json();setData(processRaw(json));setStatus("done");setUpdated(new Date());return;}
      catch(e){if(e.name==="AbortError")return;console.warn("[wc]",url,e.message);}
    }
    setStatus("error");
  },[]);
  useEffect(()=>{load();const id=setInterval(load,90000);return()=>{clearInterval(id);abort.current?.abort();};},[load]);
  return{data,status,updated,reload:load};
}

function useToday(){
  const [iso,setIso]=useState(()=>new Date().toISOString().slice(0,10));
  useEffect(()=>{
    fetch("https://worldtimeapi.org/api/timezone/America/New_York").then(r=>r.json()).then(d=>{if(d?.datetime)setIso(new Date(d.datetime).toISOString().slice(0,10));}).catch(()=>{});
    const id=setInterval(()=>{const s=new Date().toISOString().slice(0,10);setIso(p=>p===s?p:s);},30000);
    return()=>clearInterval(id);
  },[]);
  return iso;
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function parseScore(s){if(!s)return null;const p=s.split("-");if(p.length!==2)return null;const h=parseInt(p[0]),a=parseInt(p[1]);return isNaN(h)||isNaN(a)?null:{h,a};}
function getLeagueCounts(sq){if(!sq)return{};const c={};LEAGUES.forEach(l=>(c[l]=0));sq.forEach(p=>{c[p.league]=(c[p.league]||0)+1;});return c;}
function calcStandings(gk,byKey){
  const teams=GROUPS[gk],rows={};
  teams.forEach(t=>{rows[t]={team:t,mp:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};});
  for(let i=0;i<teams.length;i++)for(let j=i+1;j<teams.length;j++){
    const e=byKey?.[pkey(teams[i],teams[j])];if(!e?.score)continue;
    const sc=parseScore(e.score);if(!sc)continue;
    const{h,a}=sc;const hr=rows[e.home],ar=rows[e.away];if(!hr||!ar)continue;
    hr.mp++;ar.mp++;hr.gf+=h;hr.ga+=a;ar.gf+=a;ar.ga+=h;
    if(h>a){hr.w++;hr.pts+=3;ar.l++;}else if(h<a){ar.w++;ar.pts+=3;hr.l++;}else{hr.d++;hr.pts++;ar.d++;ar.pts++;}
  }
  return Object.values(rows).sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf||a.team.localeCompare(b.team));
}

      <div style={{marginBottom:"12px"}}><input value={tf} onChange={e=>setTF(e.target.value)} placeholder="Filter by team…" style={{width:"100%",padding:"6px 12px",borderRadius:"6px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",color:"#e2e8f0",fontSize:"14px",outline:"none"}}/></div>
      <div style={{display:"flex",flexWrap:"wrap",gap:"6px",marginBottom:"16px"}}>
        {STAGE_OPTS.map(s=><button key={s.id} onClick={()=>setSF(s.id)} style={{padding:"4px 8px",borderRadius:"4px",fontSize:"11px",cursor:"pointer",background:sf===s.id?"rgba(59,130,246,0.3)":"rgba(255,255,255,0.05)",border:sf===s.id?"1px solid rgba(59,130,246,0.5)":"1px solid rgba(255,255,255,0.1)",color:sf===s.id?"#93c5fd":"#94a3b8",fontWeight:sf===s.id?600:400}}>{s.l}</button>)}
      </div>
      {Object.entries(byDate).sort(([a],[b])=>a.localeCompare(b)).map(([date,entries])=>{
        const isToday=date===todayISO;const d=new Date(date+"T12:00:00");
        return(
          <div key={date} id={isToday?"today-anchor":undefined} style={{marginBottom:"20px",scrollMarginTop:isToday?"16px":undefined}}>
            <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"8px"}}>
              <div style={{flex:1,height:"1px",background:isToday?"rgba(217,119,6,0.3)":"rgba(255,255,255,0.07)"}}/>
              <span style={{fontSize:"11px",fontWeight:600,color:isToday?"#fbbf24":"#9ca3af",flexShrink:0}}>{isToday&&<span style={{marginRight:"4px"}}>★ TODAY —</span>}{d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"})}</span>
              {SL[entries[0]?.stage]&&<span style={{fontSize:"11px",color:"#374151",flexShrink:0}}>{SL[entries[0].stage]}</span>}
              <div style={{flex:1,height:"1px",background:isToday?"rgba(217,119,6,0.3)":"rgba(255,255,255,0.07)"}}/>
            </div>
            {entries.map((e,i)=><MatchCard key={i} entry={e} todayISO={todayISO} showSquads={e.stage==="group"}/>)}
          </div>
        );
      })}
    </div>
  );
}

// ─── BRACKET ─────────────────────────────────────────────────────────────────
function BracketSlot({entry,small=false}){
  if(!entry)return<div style={{width:small?130:150,height:small?52:64,borderRadius:"6px",border:"1px solid rgba(255,255,255,0.08)",background:"rgba(255,255,255,0.02)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><span style={{fontSize:"11px",color:"#374151"}}>TBD</span></div>;
  const{home,away,score}=entry;const sc=parseScore(score);const hWon=sc?sc.h>sc.a:false;const aWon=sc?sc.a>sc.h:false;
  const date=entry.date?new Date(entry.date+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"}):"";
  return(
    <div style={{width:small?130:150,borderRadius:"6px",overflow:"hidden",border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.04)",flexShrink:0}}>
      {[{t:home,w:hWon,s:score?.[0]},{t:away,w:aWon,s:score?.[2]}].map(({t,w,s},idx)=>(
        <div key={idx} style={{display:"flex",alignItems:"center",gap:"4px",padding:"4px 8px",borderBottom:idx===0?"1px solid rgba(255,255,255,0.07)":"none",background:w?"rgba(59,130,246,0.15)":"transparent"}}>
          <span style={{fontSize:small?11:13,flexShrink:0}}>{FLAG[t]||"❓"}</span>
          <span style={{fontSize:small?10:11,color:w?"#e2e8f0":"#9ca3af",fontWeight:w?700:400,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t}</span>
          {score&&<span style={{fontSize:small?11:12,fontWeight:700,color:w?"#fff":"#6b7280",minWidth:"12px",textAlign:"right"}}>{s}</span>}
        </div>
      ))}
      {date&&!small&&<div style={{padding:"1px 8px 3px",background:"rgba(0,0,0,0.2)",fontSize:"9px",color:"#374151"}}>{date} {entry.time||""}</div>}
    </div>
  );
}

function Connector({count,slotH,gap}){
  const totalH=count*slotH+(count-1)*gap;const arms=[];
  for(let i=0;i<count;i+=2){const ty=i*(slotH+gap)+slotH/2,by=(i+1)*(slotH+gap)+slotH/2,my=(ty+by)/2;arms.push(<g key={i}><path d={`M0,${ty} H10 V${my}`} fill="none" stroke="rgba(255,255,255,0.15)" strokeWidth="1.5"/><path d={`M0,${by} H10 V${my}`} fill="none" stroke="rgba(255,255,255,0.15)" strokeWidth="1.5"/><path d={`M10,${my} H20`} fill="none" stroke="rgba(255,255,255,0.15)" strokeWidth="1.5"/></g>);}
  return<svg width="20" height={totalH} style={{flexShrink:0}}>{arms}</svg>;
}

const SH=64,SHS=52,GAP=10;
const BL_LEFT={r32:[74,76,73,75,78,77,81,82],r16:[89,90,91,92],qf:[97,99]};
const BL_RIGHT={r32:[83,84,85,87,80,86,88,79],r16:[93,94,95,96],qf:[98,100]};

function BracketHalf({byNum,nums,small=false}){
  const sh=small?SHS:SH;
  return(<div style={{display:"flex",alignItems:"center"}}><div style={{display:"flex",flexDirection:"column",gap:`${GAP}px`}}>{nums.map(n=><BracketSlot key={n} entry={byNum?.[n]} small={small}/>)}</div><Connector count={nums.length} slotH={sh} gap={GAP}/></div>);
}

function BracketView({byNum,todayISO}){
  const[view,setView]=useState("full");
  const r32All=[...new Set([...BL_LEFT.r32,...BL_RIGHT.r32])].sort((a,b)=>a-b);
  return(
    <div>
      <div style={{display:"flex",gap:"8px",marginBottom:"12px"}}>
        {[{id:"full",l:"🏆 Full Bracket"},{id:"r32",l:"Round of 32"}].map(v=>(
          <button key={v.id} onClick={()=>setView(v.id)} style={{padding:"6px 12px",borderRadius:"8px",fontSize:"12px",fontWeight:500,cursor:"pointer",background:view===v.id?"rgba(59,130,246,0.3)":"rgba(255,255,255,0.05)",border:view===v.id?"1px solid rgba(59,130,246,0.6)":"1px solid rgba(255,255,255,0.1)",color:view===v.id?"#93c5fd":"#94a3b8"}}>{v.l}</button>
        ))}
      </div>
      {view==="r32"&&<div>{r32All.map(n=>{const e=byNum?.[n];return e?<MatchCard key={n} entry={e} todayISO={todayISO} showSquads={false}/>:null;})}</div>}
      {view==="full"&&(
        <div>
          <p style={{fontSize:"11px",color:"#4b5563",marginBottom:"8px"}}>← Scroll horizontally</p>
          <div style={{overflowX:"auto",paddingBottom:"16px"}}>
            <div style={{display:"flex",alignItems:"center",gap:0,minWidth:"980px",padding:"4px 0"}}>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",minWidth:0}}>
                <div style={{fontSize:"10px",fontWeight:600,color:"#4b5563",textTransform:"uppercase",marginBottom:"8px",whiteSpace:"nowrap"}}>Round of 32</div>
                <BracketHalf byNum={byNum} nums={BL_LEFT.r32} small/>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",minWidth:0}}>
                <div style={{fontSize:"10px",fontWeight:600,color:"#4b5563",textTransform:"uppercase",marginBottom:"8px",whiteSpace:"nowrap"}}>Round of 16</div>
                <BracketHalf byNum={byNum} nums={BL_LEFT.r16}/>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",minWidth:0}}>
                <div style={{fontSize:"10px",fontWeight:600,color:"#4b5563",textTransform:"uppercase",marginBottom:"8px"}}>QF</div>
                <BracketHalf byNum={byNum} nums={BL_LEFT.qf}/>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"8px",minWidth:"160px",padding:"0 8px"}}>
                <div style={{fontSize:"10px",fontWeight:600,color:"#4b5563",textTransform:"uppercase"}}>SF</div>
                <BracketSlot entry={byNum?.[101]}/>
                <div style={{width:"100%",height:"1px",background:"rgba(255,255,255,0.05)"}}/>
                <div style={{fontSize:"11px",fontWeight:700,color:"#fbbf24"}}>🏆 FINAL</div>
                <BracketSlot entry={byNum?.[104]}/>
                <div style={{fontSize:"10px",color:"#6b7280"}}>3rd Place</div>
                <BracketSlot entry={byNum?.[103]}/>
                <div style={{width:"100%",height:"1px",background:"rgba(255,255,255,0.05)"}}/>
                <div style={{fontSize:"10px",fontWeight:600,color:"#4b5563",textTransform:"uppercase"}}>SF</div>
                <BracketSlot entry={byNum?.[102]}/>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",minWidth:0}}>
                <div style={{fontSize:"10px",fontWeight:600,color:"#4b5563",textTransform:"uppercase",marginBottom:"8px"}}>QF</div>
                <BracketHalf byNum={byNum} nums={BL_RIGHT.qf}/>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",minWidth:0}}>
                <div style={{fontSize:"10px",fontWeight:600,color:"#4b5563",textTransform:"uppercase",marginBottom:"8px",whiteSpace:"nowrap"}}>Round of 16</div>
                <BracketHalf byNum={byNum} nums={BL_RIGHT.r16}/>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",minWidth:0}}>
                <div style={{fontSize:"10px",fontWeight:600,color:"#4b5563",textTransform:"uppercase",marginBottom:"8px",whiteSpace:"nowrap"}}>Round of 32</div>
                <BracketHalf byNum={byNum} nums={BL_RIGHT.r32} small/>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── RANKINGS VIEW ───────────────────────────────────────────────────────────
function TeamRow({team}){
  const[open,setOpen]=useState(false);
  const sq=SQUADS[team];const counts=useMemo(()=>sq?getLeagueCounts(sq):{},[team]);const rank=FIFA_RANKINGS[team];
  return(
    <div onClick={()=>setOpen(o=>!o)} style={{borderRadius:"8px",cursor:"pointer",marginBottom:"6px",background:open?"rgba(59,130,246,0.08)":"rgba(255,255,255,0.03)",border:open?"1px solid rgba(59,130,246,0.35)":"1px solid rgba(255,255,255,0.06)"}}>
      <div style={{display:"flex",alignItems:"center",gap:"8px",padding:"8px 12px"}}>
        <span style={{fontSize:"11px",fontFamily:"monospace",color:rank<=5?"#fbbf24":rank<=15?"#94a3b8":"#4b5563",width:"20px",textAlign:"right",flexShrink:0}}>{rank}</span>
        <span style={{fontSize:"20px",flexShrink:0}}>{FLAG[team]||"🏳"}</span>
        <span style={{fontSize:"14px",fontWeight:500,color:"#e2e8f0",width:"144px",flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{team}</span>
        {sq?<div style={{flex:1,minWidth:0}}><LeagueBar counts={counts} total={sq.length}/></div>:<span style={{flex:1,fontSize:"11px",color:"#4b5563",fontStyle:"italic"}}>limited data</span>}
        {sq&&<span style={{fontSize:"11px",color:"#4b5563",flexShrink:0,marginLeft:"4px"}}>{sq.length}</span>}
        <span style={{fontSize:"11px",color:"#4b5563",flexShrink:0,marginLeft:"4px"}}>{open?"▲":"▼"}</span>
      </div>
      {open&&sq&&<div style={{padding:"0 12px 12px",borderTop:"1px solid rgba(255,255,255,0.05)"}}><SquadPanel team={team}/></div>}
    </div>
  );
}

function RankingsView(){
  const[fl,setFL]=useState(null);const[search,setSearch]=useState("");
  const allTeams=useMemo(()=>Object.keys(FIFA_RANKINGS).sort((a,b)=>FIFA_RANKINGS[a]-FIFA_RANKINGS[b]),[]);
  const filtered=useMemo(()=>allTeams.filter(t=>{if(search)return t.toLowerCase().includes(search.toLowerCase());if(fl){const sq=SQUADS[t];if(!sq)return false;const c=getLeagueCounts(sq);return(c[fl]||0)>0;}return true;}),[search,fl,allTeams]);
  return(
    <div>
      <div style={{marginBottom:"12px"}}><input value={search} onChange={e=>{setSearch(e.target.value);setFL(null);}} placeholder="Search team…" style={{width:"100%",padding:"6px 12px",borderRadius:"6px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",color:"#e2e8f0",fontSize:"14px",outline:"none"}}/></div>
      <div style={{display:"flex",flexWrap:"wrap",gap:"6px",marginBottom:"16px"}}>{LEAGUES.map(l=><button key={l} onClick={()=>{setFL(fl===l?null:l);setSearch("");}} style={{padding:"4px 8px",borderRadius:"4px",fontSize:"11px",cursor:"pointer",background:fl===l?LC[l]:"rgba(255,255,255,0.05)",border:`1px solid ${fl===l?LC[l]:"rgba(255,255,255,0.1)"}`,color:fl===l?"#fff":"#94a3b8",fontWeight:fl===l?600:400}}>{l}</button>)}</div>
      {filtered.map(t=><TeamRow key={t} team={t}/>)}
    </div>
  );
}

// ─── APP ─────────────────────────────────────────────────────────────────────
function App(){
  const[tab,setTab]=useState("schedule");
  const todayISO=useToday();
  const{data,status,updated,reload}=useWorldCup();
  const byKey=data?.byKey||{};const byNum=data?.byNum||{};const all=data?.all||[];
  const todayCount=useMemo(()=>all.filter(e=>e.date===todayISO).length,[all,todayISO]);
  const TABS=[{id:"schedule",l:"📅 Schedule"},{id:"groups",l:"🔡 Groups"},{id:"bracket",l:"🏆 Bracket"},{id:"rankings",l:"⚽ Rankings"}];
  return(
    <div style={{background:"linear-gradient(160deg,#0a0f1e 0%,#0f172a 60%,#0a1628 100%)",minHeight:"100vh",fontFamily:"'Inter',system-ui,sans-serif",color:"#e2e8f0"}}>
      <div style={{borderBottom:"1px solid rgba(255,255,255,0.07)",background:"rgba(255,255,255,0.02)",padding:"16px 16px 0"}}>
        <div style={{maxWidth:"768px",margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"8px"}}>
            <span style={{fontSize:"28px"}}>⚽</span>
            <div style={{flex:1,minWidth:0}}>
              <h1 style={{fontSize:"18px",fontWeight:700,color:"#fff",lineHeight:"1.2"}}>2026 FIFA World Cup</h1>
              <p style={{fontSize:"11px",color:"#4b5563"}}>48 teams · 104 matches · Live via openfootball/worldcup.json</p>
            </div>
            {todayCount>0&&<button onClick={()=>{setTab("schedule");setTimeout(()=>document.getElementById("today-anchor")?.scrollIntoView({behavior:"smooth",block:"start"}),80);}} style={{flexShrink:0,display:"flex",alignItems:"center",gap:"6px",padding:"6px 12px",borderRadius:"8px",fontSize:"12px",fontWeight:600,cursor:"pointer",background:"rgba(217,119,6,0.2)",border:"1px solid rgba(217,119,6,0.55)",color:"#fbbf24"}}>★ {todayCount} Today</button>}
          </div>
          <div style={{display:"flex",gap:"4px",overflowX:"auto"}}>
            {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"8px 12px",fontSize:"14px",fontWeight:500,borderRadius:"8px 8px 0 0",whiteSpace:"nowrap",cursor:"pointer",background:tab===t.id?"rgba(255,255,255,0.07)":"transparent",borderBottom:tab===t.id?"2px solid #3b82f6":"2px solid transparent",color:tab===t.id?"#e2e8f0":"#6b7280",border:"none"}}>{t.l}</button>)}
          </div>
        </div>
      </div>
      <div style={{maxWidth:"768px",margin:"0 auto",padding:"16px"}}>
        <FeedStatus status={status} updated={updated} reload={reload}/>
        {tab==="schedule"&&<ScheduleView all={all} todayISO={todayISO}/>}
        {tab==="groups"&&<GroupsView byKey={byKey} todayISO={todayISO}/>}
        {tab==="bracket"&&<BracketView byNum={byNum} todayISO={todayISO}/>}
        {tab==="rankings"&&<RankingsView/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
