// State management
const _subs = new Map();
let _uid = 0;
function createStore(init) {
  let state = init;
  const id = _uid++;
  _subs.set(id, new Set());
  return {
    get: () => state,
    set: (next) => { state = typeof next === 'function' ? next(state) : next; _subs.get(id).forEach(fn => fn(state)); },
    sub: (fn) => { _subs.get(id).add(fn); return () => _subs.get(id).delete(fn); },
  };
}

// DOM helpers
const ce = (tag, attrs, ...children) => {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k.startsWith('on') && typeof v === 'function') el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'className') el.className = v;
    else if (k === 'id') el.id = v;
    else if (k === 'value') el.value = v;
    else if (k !== 'key') el.setAttribute(k, v);
  }
  for (const ch of children.flat(Infinity)) {
    if (ch == null || ch === false) continue;
    el.appendChild(typeof ch === 'string' || typeof ch === 'number' ? document.createTextNode(ch) : ch);
  }
  return el;
};
const div = (a,...c) => ce('div',a,...c);
const span = (a,...c) => ce('span',a,...c);
const btn = (a,...c) => ce('button',a,...c);
const inp = (a) => ce('input',a);
const svg = (attrs, ...c) => {
  const el = document.createElementNS('http://www.w3.org/2000/svg','svg');
  for(const [k,v] of Object.entries(attrs||{})) el.setAttribute(k,v);
  c.flat().forEach(ch => { if(ch) el.appendChild(ch); });
  return el;
};
const path = (attrs) => {
  const el = document.createElementNS('http://www.w3.org/2000/svg','path');
  for(const [k,v] of Object.entries(attrs||{})) el.setAttribute(k,v);
  return el;
};

// Mount a component that re-renders when stores change
function mount(container, render, stores=[]) {
  let current = null;
  const update = () => {
    const next = render();
    if (current) container.replaceChild(next, current);
    else container.appendChild(next);
    current = next;
  };
  stores.forEach(s => s.sub(update));
  update();
  return () => { if(current) container.removeChild(current); };
}

function stageOf(r){if(!r)return"group";const s=r.toLowerCase();if(s.includes("round of 32"))return"r32";if(s.includes("round of 16"))return"r16";if(s.includes("quarter"))return"qf";if(s.includes("semi"))return"sf";if(s.includes("third"))return"3rd";if(s.includes("final"))return"final";return"group";}
function toET(t){if(!t)return"";const m=t.match(/(\d+):(\d+)\s*UTC([+-]\d+)/);if(!m)return t;const h=((parseInt(m[1])-parseInt(m[3])-4)%24+24)%24;return(h%12||12)+":"+m[2]+" "+(h>=12?"PM":"AM")+" ET";}
function processRaw(json){const byKey={},byNum={},all=[];(json.matches||[]).forEach(m=>{const h=norm(m.team1),a=norm(m.team2);const e={home:h,away:a,score:m.score&&m.score.ft?m.score.ft[0]+"-"+m.score.ft[1]:null,ht:m.score&&m.score.ht?m.score.ht[0]+"-"+m.score.ht[1]:null,goals1:m.goals1||[],goals2:m.goals2||[],date:m.date,time:toET(m.time),ground:m.ground,stage:stageOf(m.round),round:m.round,num:m.num||null};byKey[pkey(h,a)]=e;if(m.num)byNum[m.num]=e;all.push(e);});return{byKey,byNum,all};}

const $tab    = createStore("schedule");
const $data   = createStore(null);
const $status = createStore("loading");
const $today  = createStore(new Date().toISOString().slice(0,10));

// Load today from worldtimeapi
fetch("https://worldtimeapi.org/api/timezone/America/New_York")
  .then(r=>r.json()).then(d=>{if(d&&d.datetime)$today.set(new Date(d.datetime).toISOString().slice(0,10));}).catch(()=>{});

// Load openfootball
const URLS=["https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json","https://cdn.jsdelivr.net/gh/openfootball/worldcup.json@master/2026/worldcup.json"];
async function loadData(){
  $status.set("loading");
  for(const url of URLS){
    try{const r=await fetch(url,{cache:"no-cache"});if(!r.ok)throw new Error("HTTP "+r.status);const j=await r.json();$data.set(processRaw(j));$status.set("done");return;}
    catch(e){console.warn(url,e.message);}
  }
  $status.set("error");
}

setInterval(loadData, 90000);

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function parseScore(s){if(!s)return null;const p=s.split("-");if(p.length!==2)return null;const h=parseInt(p[0]),a=parseInt(p[1]);return isNaN(h)||isNaN(a)?null:{h,a};}
function getLC(sq){const c={};LEAGUES.forEach(l=>(c[l]=0));sq.forEach(p=>{c[p.league]=(c[p.league]||0)+1;});return c;}
function calcStandings(gk,byKey){
  const teams=GROUPS[gk],rows={};teams.forEach(t=>{rows[t]={team:t,mp:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};});
  for(let i=0;i<teams.length;i++)for(let j=i+1;j<teams.length;j++){const e=byKey&&byKey[pkey(teams[i],teams[j])];if(!e||!e.score)continue;const sc=parseScore(e.score);if(!sc)continue;const{h,a}=sc;const hr=rows[e.home],ar=rows[e.away];if(!hr||!ar)continue;hr.mp++;ar.mp++;hr.gf+=h;hr.ga+=a;ar.gf+=a;ar.ga+=h;if(h>a){hr.w++;hr.pts+=3;ar.l++;}else if(h<a){ar.w++;ar.pts+=3;hr.l++;}else{hr.d++;hr.pts++;ar.d++;ar.pts++;}}
  return Object.values(rows).sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf||a.team.localeCompare(b.team));
}

function matchCard(entry, todayISO, showSquads=true) {
  if (!entry) return null;
  const {home,away,score,ht,goals1=[],goals2=[],date,time,ground,stage,round} = entry;
  let open = false;
  const sc = parseScore(score);
  const hWon = sc ? sc.h>sc.a : false;
  const aWon = sc ? sc.a>sc.h : false;
  const status = score?"played":date===todayISO?"today":date&&date<todayISO?"played":"upcoming";
  const r1=FIFA[home], r2=FIFA[away];
  const dateStr = date?new Date(date+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}):"";
  const sColor = status==="played"?"#6b7280":status==="today"?"#f59e0b":"#3b82f6";
  const sLabel = status==="played"?"FT":status==="today"?"TODAY":"Upcoming";
  const barBg  = status==="played"?"rgba(75,85,99,0.12)":status==="today"?"rgba(217,119,6,0.15)":"rgba(30,58,95,0.10)";
  const border = status==="today"?"1px solid rgba(217,119,6,0.4)":"1px solid rgba(255,255,255,0.07)";

  // Build expandable body
  function buildBody() {
    const kids = [];
    if (goals1.length||goals2.length) {
      kids.push(div({style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',marginBottom:'12px'}},
        div({},...goals1.map(g=>div({style:{fontSize:'11px',color:'#9ca3af',lineHeight:'1.8'}},(g.owngoal?'⚽ OG ':g.penalty?'⚽ P ':'⚽ ')+g.name+' ',span({style:{color:'#4b5563'}},g.minute+"'")))),
        div({style:{textAlign:'right'}},...goals2.map(g=>div({style:{fontSize:'11px',color:'#9ca3af',lineHeight:'1.8'}},span({style:{color:'#4b5563'}},g.minute+"'"),' '+g.name+' '+(g.owngoal?'OG ⚽':g.penalty?'P ⚽':'⚽'))))
      ));
    }
    if (showSquads && stage==="group") {
      kids.push(div({style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}},
        ...[home,away].map(team=>div({style:{minWidth:0}},
          div({style:{display:'flex',alignItems:'center',gap:'6px',marginBottom:'8px'}},
            span({style:{fontSize:'18px'}},FLAG[team]||'🏳'),
            span({style:{fontSize:'11px',fontWeight:600,color:'#e2e8f0',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},team),
            FIFA[team]&&span({style:{fontSize:'10px',color:'#6b7280'}},'#'+FIFA[team])
          ),
          squadPanel(team)
        ))
      ));
    }
    return kids;
  }

  const bodyEl = div({style:{borderTop:'1px solid rgba(255,255,255,0.05)',padding:'12px'}},...buildBody());
  const arrowEl = span({style:{fontSize:'11px',color:'#4b5563'}});

  const card = div({style:{borderRadius:'8px',marginBottom:'8px',overflow:'hidden',border,background:'rgba(255,255,255,0.03)'}},
    div({style:{cursor:'pointer'},onclick:function(){
      open = !open;
      arrowEl.textContent = open?'▲':'▼';
      if(open) card.appendChild(bodyEl);
      else if(bodyEl.parentNode===card) card.removeChild(bodyEl);
    }},
      div({style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'6px 12px',background:barBg,borderBottom:'1px solid rgba(255,255,255,0.05)'}},
        div({style:{display:'flex',alignItems:'center',gap:'8px'}},
          span({style:{fontSize:'11px',fontWeight:'700',color:sColor}},sLabel),
          dateStr&&span({style:{fontSize:'11px',color:'#6b7280'}},dateStr),
          time&&span({style:{fontSize:'11px',color:'#9ca3af'}},time)
        ),
        div({style:{display:'flex',alignItems:'center',gap:'8px'}},
          span({style:{fontSize:'11px',color:'#374151',maxWidth:'100px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},ground||round||''),
          score&&div({style:{display:'flex',flexDirection:'column',alignItems:'center'}},
            span({style:{fontSize:'14px',fontWeight:'700',color:'#fff',background:'rgba(0,0,0,0.3)',padding:'2px 8px',borderRadius:'4px'}},score),
            ht&&span({style:{fontSize:'9px',color:'#4b5563'}},ht+' HT')
          ),
          arrowEl
        )
      ),
      div({style:{display:'flex',alignItems:'center',gap:'8px',padding:'10px 12px'}},
        div({style:{flex:1,display:'flex',alignItems:'center',gap:'8px',minWidth:0}},
          span({style:{fontSize:'22px',flexShrink:0}},FLAG[home]||'🏳'),
          div({style:{minWidth:0}},
            div({style:{fontSize:'14px',fontWeight:hWon?'700':'500',color:hWon?'#fff':'#e2e8f0',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},home),
            r1&&div({style:{fontSize:'10px',color:'#6b7280'}},'FIFA #'+r1)
          )
        ),
        div({style:{fontSize:'11px',fontWeight:'700',color:'#4b5563',padding:'0 4px'}},'VS'),
        div({style:{flex:1,display:'flex',alignItems:'center',gap:'8px',minWidth:0,justifyContent:'flex-end'}},
          div({style:{minWidth:0,textAlign:'right'}},
            div({style:{fontSize:'14px',fontWeight:aWon?'700':'500',color:aWon?'#fff':'#e2e8f0',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},away),
            r2&&div({style:{fontSize:'10px',color:'#6b7280'}},'FIFA #'+r2)
          ),
          span({style:{fontSize:'22px',flexShrink:0}},FLAG[away]||'🏳')

      )
    )
  );
  arrowEl.textContent = '▼';
  return card;
}

function buildScheduleView() {
  let sf='all', tf='';
  const data = $data.get(); const todayISO = $today.get();
  const all = data?data.all:[];

  const SL={group:"Group",r32:"R32",r16:"R16",qf:"QF",sf:"SF","3rd":"3rd",final:"FINAL"};
  const SOPTS=[{id:"all",l:"All"},{id:"group",l:"Group"},{id:"r32",l:"R32"},{id:"r16",l:"R16"},{id:"qf",l:"QF"},{id:"sf",l:"SF"},{id:"3rd",l:"3rd"},{id:"final",l:"Final"}];

  const container = div({style:{paddingTop:'0'}});

  function renderList() {
    container.innerHTML = '';
    const lower = tf.toLowerCase();
    const byDate = {};
    all.filter(e=>{
      if(sf!=='all'&&e.stage!==sf)return false;
      if(lower&&!e.home.toLowerCase().includes(lower)&&!e.away.toLowerCase().includes(lower))return false;
      return true;
    }).forEach(e=>{const d=e.date||'TBD';if(!byDate[d])byDate[d]=[];byDate[d].push(e);});

    Object.entries(byDate).sort(([a],[b])=>a.localeCompare(b)).forEach(([date,entries])=>{
      const isToday = date===todayISO;
      const d = new Date(date+'T12:00:00');
      const dayDiv = div({id:isToday?'today-anchor':undefined,style:{marginBottom:'20px',scrollMarginTop:'16px'}},
        div({style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'8px'}},
          div({style:{flex:1,height:'1px',background:isToday?'rgba(217,119,6,0.3)':'rgba(255,255,255,0.07)'}}),
          span({style:{fontSize:'11px',fontWeight:'600',color:isToday?'#fbbf24':'#9ca3af',flexShrink:0,whiteSpace:'nowrap'}},
            ...(isToday?[span({style:{marginRight:'4px'}},'★ TODAY — ')]:[]),
            d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"})
          ),
          SL[entries[0].stage]&&span({style:{fontSize:'11px',color:'#374151',flexShrink:0}},SL[entries[0].stage]),
          div({style:{flex:1,height:'1px',background:isToday?'rgba(217,119,6,0.3)':'rgba(255,255,255,0.07)'}})
        ),
        ...entries.map(e=>matchCard(e,todayISO,e.stage==='group'))
      );
      container.appendChild(dayDiv);
    });
  }

  const searchEl = inp({type:'text',placeholder:'Filter by team…',value:'',oninput:function(e){tf=e.target.value;renderList();},style:{width:'100%',padding:'7px 12px',borderRadius:'6px',background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.1)',color:'#e2e8f0',fontSize:'14px',outline:'none',display:'block',marginBottom:'12px'}});

  const filterBtns = div({style:{display:'flex',flexWrap:'wrap',gap:'6px',marginBottom:'16px'}},
    ...SOPTS.map(s=>{
      const b = btn({style:{padding:'4px 10px',borderRadius:'4px',fontSize:'11px',background:sf===s.id?'rgba(59,130,246,0.3)':'rgba(255,255,255,0.05)',border:'1px solid '+(sf===s.id?'rgba(59,130,246,0.5)':'rgba(255,255,255,0.1)'),color:sf===s.id?'#93c5fd':'#94a3b8',fontWeight:sf===s.id?'600':'400'},onclick:function(){
        sf=s.id;
        filterBtns.querySelectorAll('button').forEach((b,i)=>{
          const active=SOPTS[i].id===sf;
          b.style.background=active?'rgba(59,130,246,0.3)':'rgba(255,255,255,0.05)';
          b.style.border='1px solid '+(active?'rgba(59,130,246,0.5)':'rgba(255,255,255,0.1)');
          b.style.color=active?'#93c5fd':'#94a3b8';
          b.style.fontWeight=active?'600':'400';
        });
        renderList();
      }},s.l);
      return b;
    })
  );

  renderList();
  return div({},searchEl,filterBtns,container);
}

  const matchesContainer=div({});

  function renderGroup(){
    standingsContainer.innerHTML='';matchesContainer.innerHTML='';

    for(let i=0;i<teams.length;i++)for(let j=i+1;j<teams.length;j++){const e=byKey&&byKey[pkey(teams[i],teams[j])];if(e)out.push(e);}

  renderGroup();
  return div({},groupBtns,standingsContainer,div({style:{fontSize:'10px',fontWeight:'600',color:'#4b5563',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:'8px'}},'Matches — tap to expand'),matchesContainer);

  );
}

function connector(count,sh,gap){
  const totalH=count*sh+(count-1)*gap;
  const el=svg({width:'20',height:String(totalH),style:{flexShrink:0}});
  for(let i=0;i<count;i+=2){const ty=i*(sh+gap)+sh/2,by=(i+1)*(sh+gap)+sh/2,my=(ty+by)/2;['M0,'+ty+' H10 V'+my,'M0,'+by+' H10 V'+my,'M10,'+my+' H20'].forEach(d=>el.appendChild(path({d,fill:'none',stroke:'rgba(255,255,255,0.15)','stroke-width':'1.5'})));}
  return el;
}

function bhalf(byNum,nums,small=false){
  const sh=small?50:64,gap=10;
  const slots=div({style:{display:'flex',flexDirection:'column',gap:gap+'px'}});
  nums.forEach(n=>slots.appendChild(bslot(byNum&&byNum[n],small)));
  return div({style:{display:'flex',alignItems:'center'}},slots,connector(nums.length,sh,gap));
}

function colLabel(t){return div({style:{fontSize:'10px',fontWeight:'600',color:'#4b5563',textTransform:'uppercase',marginBottom:'8px',textAlign:'center',whiteSpace:'nowrap'}},t);}

function buildBracketView(){
  const byNum=($data.get()||{}).byNum||{};const todayISO=$today.get();
  let view='full';

  const BL={r32:[74,76,73,75,78,77,81,82],r16:[89,90,91,92],qf:[97,99]};
  const BR={r32:[83,84,85,87,80,86,88,79],r16:[93,94,95,96],qf:[98,100]};
  const r32All=[...new Set([...BL.r32,...BR.r32])].sort((a,b)=>a-b);

  const content=div({});
  const toggleBtns=div({style:{display:'flex',gap:'8px',marginBottom:'12px'}});

  function renderContent(){
    content.innerHTML='';
    toggleBtns.querySelectorAll('button').forEach(b=>{
      const active=b.dataset.v===view;
      b.style.background=active?'rgba(59,130,246,0.3)':'rgba(255,255,255,0.05)';
      b.style.border=active?'1px solid rgba(59,130,246,0.6)':'1px solid rgba(255,255,255,0.1)';
      b.style.color=active?'#93c5fd':'#94a3b8';
    });
    if(view==='r32'){
      r32All.forEach(n=>{const e=byNum[n];if(e)content.appendChild(matchCard(e,todayISO,false));});
    } else {
      content.appendChild(div({style:{fontSize:'11px',color:'#4b5563',marginBottom:'8px'}},'← Scroll to see full bracket'));
      const scrollWrap=div({style:{overflowX:'auto',paddingBottom:'16px'}});
      const row=div({style:{display:'flex',alignItems:'center',minWidth:'980px',padding:'4px 0'}});
      // Left side
      [
        [colLabel('Round of 32'),bhalf(byNum,BL.r32,true)],
        [colLabel('Round of 16'),bhalf(byNum,BL.r16)],
        [colLabel('Quarters'),bhalf(byNum,BL.qf)],
      ].forEach(([lbl,half])=>{const c=div({style:{display:'flex',flexDirection:'column',alignItems:'center'}});c.appendChild(lbl);c.appendChild(half);row.appendChild(c);});
      // Center
      const center=div({style:{display:'flex',flexDirection:'column',alignItems:'center',gap:'8px',minWidth:'160px',padding:'0 8px'}});
      center.appendChild(div({style:{fontSize:'10px',fontWeight:'600',color:'#4b5563',textTransform:'uppercase'}},'SF'));
      center.appendChild(bslot(byNum[101]));
      center.appendChild(div({style:{width:'100%',height:'1px',background:'rgba(255,255,255,0.05)'}}));
      center.appendChild(div({style:{fontSize:'11px',fontWeight:'700',color:'#fbbf24'}},'🏆 FINAL'));
      center.appendChild(bslot(byNum[104]));
      center.appendChild(div({style:{fontSize:'10px',color:'#6b7280'}},'3rd Place'));
      center.appendChild(bslot(byNum[103]));
      center.appendChild(div({style:{width:'100%',height:'1px',background:'rgba(255,255,255,0.05)'}}));
      center.appendChild(div({style:{fontSize:'10px',fontWeight:'600',color:'#4b5563',textTransform:'uppercase'}},'SF'));
      center.appendChild(bslot(byNum[102]));
      row.appendChild(center);
      // Right side
      [
        [colLabel('Quarters'),bhalf(byNum,BR.qf)],
        [colLabel('Round of 16'),bhalf(byNum,BR.r16)],
        [colLabel('Round of 32'),bhalf(byNum,BR.r32,true)],
      ].forEach(([lbl,half])=>{const c=div({style:{display:'flex',flexDirection:'column',alignItems:'center'}});c.appendChild(lbl);c.appendChild(half);row.appendChild(c);});
      scrollWrap.appendChild(row);
      content.appendChild(scrollWrap);
    }
  }

  [{id:'full',l:'🏆 Full Bracket'},{id:'r32',l:'Round of 32'}].forEach(v=>{
    toggleBtns.appendChild(btn({'data-v':v.id,style:{padding:'6px 14px',borderRadius:'8px',fontSize:'12px',fontWeight:'500',background:view===v.id?'rgba(59,130,246,0.3)':'rgba(255,255,255,0.05)',border:view===v.id?'1px solid rgba(59,130,246,0.6)':'1px solid rgba(255,255,255,0.1)',color:view===v.id?'#93c5fd':'#94a3b8'},onclick:function(){view=v.id;renderContent();}},v.l));
  });

  renderContent();
  return div({},toggleBtns,content);
}

function buildRankingsView(){
  let fl=null, search='';
  const allTeams=Object.keys(FIFA).sort((a,b)=>FIFA[a]-FIFA[b]);
  const container=div({});

  function renderList(){
    container.innerHTML='';
    const lower=search.toLowerCase();
    allTeams.filter(t=>{
      if(search)return t.toLowerCase().includes(lower);
      if(fl){const sq=SQUADS[t];if(!sq)return false;const c=getLC(sq);return(c[fl]||0)>0;}
      return true;
    }).forEach(team=>{
      const sq=SQUADS[team];const rank=FIFA[team];
      let open=false;
      const body=div({style:{padding:'0 12px 12px',borderTop:'1px solid rgba(255,255,255,0.05)'}});
      if(sq){const counts=getLC(sq);body.appendChild(leagueBar(counts,sq.length));body.appendChild(squadPanel(team));}
      const arrow=span({style:{fontSize:'11px',color:'#4b5563'}},'▼');
      const row=div({style:{display:'flex',alignItems:'center',gap:'8px',padding:'8px 12px'}},
        span({style:{fontSize:'11px',fontFamily:'monospace',color:rank<=5?'#fbbf24':rank<=15?'#94a3b8':'#4b5563',width:'20px',textAlign:'right',flexShrink:0}},rank),
        span({style:{fontSize:'20px',flexShrink:0}},FLAG[team]||'🏳'),
        span({style:{fontSize:'13px',fontWeight:'500',color:'#e2e8f0',width:'140px',flexShrink:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},team),
        sq?leagueBar(getLC(sq),sq.length):span({style:{flex:1,fontSize:'11px',color:'#4b5563',fontStyle:'italic'}},'limited'),
        sq&&span({style:{fontSize:'11px',color:'#4b5563',flexShrink:0,marginLeft:'4px'}},sq.length),
        span({style:{flexShrink:0,marginLeft:'4px'}},arrow)
      );
      const card=div({style:{borderRadius:'8px',cursor:'pointer',marginBottom:'6px',background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.06)'},onclick:function(){
        open=!open;arrow.textContent=open?'▲':'▼';
        card.style.background=open?'rgba(59,130,246,0.08)':'rgba(255,255,255,0.03)';
        card.style.border=open?'1px solid rgba(59,130,246,0.35)':'1px solid rgba(255,255,255,0.06)';
        if(open){if(sq)card.appendChild(body);}else if(body.parentNode===card)card.removeChild(body);
      }},row);
      container.appendChild(card);
    });
  }

  const searchEl=inp({type:'text',placeholder:'Search team…',value:'',oninput:function(e){search=e.target.value;fl=null;leagueBtns.querySelectorAll('button').forEach(b=>{b.style.background='rgba(255,255,255,0.05)';b.style.border='1px solid rgba(255,255,255,0.1)';b.style.color='#94a3b8';b.style.fontWeight='400';});renderList();},style:{width:'100%',padding:'7px 12px',borderRadius:'6px',background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.1)',color:'#e2e8f0',fontSize:'14px',outline:'none',display:'block',marginBottom:'12px'}});

  const leagueBtns=div({style:{display:'flex',flexWrap:'wrap',gap:'6px',marginBottom:'16px'}});
  LEAGUES.forEach(l=>{
    leagueBtns.appendChild(btn({style:{padding:'4px 8px',borderRadius:'4px',fontSize:'11px',background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.1)',color:'#94a3b8'},onclick:function(){
      fl=fl===l?null:l;search='';searchEl.value='';
      leagueBtns.querySelectorAll('button').forEach((b,i)=>{
        const active=LEAGUES[i]===fl;
        b.style.background=active?LC[LEAGUES[i]]:'rgba(255,255,255,0.05)';
        b.style.border='1px solid '+(active?LC[LEAGUES[i]]:'rgba(255,255,255,0.1)');
        b.style.color=active?'#fff':'#94a3b8';b.style.fontWeight=active?'600':'400';
      });
      renderList();
    }},l));
  });

  renderList();
  return div({},searchEl,leagueBtns,container);
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function buildApp(){
  const TABS=[{id:"schedule",l:"📅 Schedule"},{id:"groups",l:"🔡 Groups"},{id:"bracket",l:"🏆 Bracket"},{id:"rankings",l:"⚽ Rankings"}];
  const contentArea=div({style:{maxWidth:'768px',margin:'0 auto',padding:'16px'}});
  const tabButtons=div({style:{display:'flex',gap:'2px',overflowX:'auto'}});

  function renderContent(){
    contentArea.innerHTML='';
    contentArea.appendChild(buildFeedStatus());
    const t=$tab.get();
    if(t==='schedule')contentArea.appendChild(buildScheduleView());
    else if(t==='groups')contentArea.appendChild(buildGroupsView());
    else if(t==='bracket')contentArea.appendChild(buildBracketView());
    else if(t==='rankings')contentArea.appendChild(buildRankingsView());
    tabButtons.querySelectorAll('button').forEach(b=>{
      const active=b.dataset.tab===$tab.get();
      b.style.borderBottom=active?'2px solid #3b82f6':'2px solid transparent';
      b.style.color=active?'#e2e8f0':'#6b7280';
      b.style.background=active?'rgba(255,255,255,0.07)':'transparent';
    });
  }

  TABS.forEach(t=>{
    tabButtons.appendChild(btn({'data-tab':t.id,style:{padding:'8px 12px',fontSize:'13px',fontWeight:'500',borderRadius:'8px 8px 0 0',whiteSpace:'nowrap',background:$tab.get()===t.id?'rgba(255,255,255,0.07)':'transparent',borderBottom:$tab.get()===t.id?'2px solid #3b82f6':'2px solid transparent',color:$tab.get()===t.id?'#e2e8f0':'#6b7280',border:'none'},onclick:function(){$tab.set(t.id);renderContent();}},t.l));
  });

  // Re-render on data changes
  $data.sub(renderContent);
  $status.sub(()=>{
    const fs=contentArea.firstChild;if(fs){contentArea.replaceChild(buildFeedStatus(),fs);}
  });

  // "Today" button
  const todayBtn=btn({id:'today-btn',style:{flexShrink:0,display:'none',alignItems:'center',gap:'6px',padding:'6px 12px',borderRadius:'8px',fontSize:'12px',fontWeight:'600',background:'rgba(217,119,6,0.2)',border:'1px solid rgba(217,119,6,0.55)',color:'#fbbf24'},onclick:function(){$tab.set('schedule');renderContent();setTimeout(()=>{const el=document.getElementById('today-anchor');if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},80);}});
  function updateTodayBtn(){const n=($data.get()?$data.get().all:[]).filter(e=>e.date===$today.get()).length;todayBtn.textContent='';todayBtn.appendChild(span({},'★ '+n+' Today'));todayBtn.style.display=n>0?'flex':'none';}
  $data.sub(updateTodayBtn);

  renderContent();

  return div({style:{background:'linear-gradient(160deg,#0a0f1e 0%,#0f172a 60%,#0a1628 100%)',minHeight:'100vh'}},
    div({style:{borderBottom:'1px solid rgba(255,255,255,0.07)',background:'rgba(255,255,255,0.02)',padding:'16px 16px 0'}},
      div({style:{maxWidth:'768px',margin:'0 auto'}},
        div({style:{display:'flex',alignItems:'center',gap:'12px',marginBottom:'10px'}},
          span({style:{fontSize:'28px'}},'⚽'),
          div({style:{flex:1,minWidth:0}},
            ce('h1',{style:{fontSize:'18px',fontWeight:'700',color:'#fff',lineHeight:'1.2'}},'2026 FIFA World Cup'),
            div({style:{fontSize:'11px',color:'#4b5563'}},'48 teams · 104 matches · Live via openfootball')
          ),
          todayBtn
        ),
        tabButtons
      )
    ),
    contentArea
  );
}

document.getElementById('root').appendChild(buildApp());
</script>
